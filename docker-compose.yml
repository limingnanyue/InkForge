# InkForge 墨铸 —— 一体化部署
# 启动：docker compose up -d
# 查看日志：docker compose logs -f
# 升级：docker compose pull && docker compose up -d

services:
  inkforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: inkforge:latest
    container_name: inkforge
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      INKFORGE_EMBED_WORKER: "true"   # 镜像内嵌守护进程；如需独立 worker，设为 false 并另行启动副本
      INKFORGE_DATA_DIR: /data
      INKFORGE_DB_PATH: /data/inkforge.db
      # 如需在容器内固定 API Key，可在此注入（更推荐在前端「模型中心」配置）
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - inkforge-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  inkforge-data:
    name: inkforge-data
